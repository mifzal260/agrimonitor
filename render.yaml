services:
  - type: web
    name: agrimonitor-backend
    env: python
    rootDir: agrimonitor_backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: PREPARE_DATABASE_ON_STARTUP
        value: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://agrimonitor-frontend.onrender.com
      - key: LOGIN_PROTECTION_STORE
        value: memory
      - key: LOGIN_PROTECTION_FAIL_MODE
        value: closed
      - key: REDIS_URL
        sync: false
      - key: REDIS_KEY_PREFIX
        value: agrimonitor:login-protection
      - key: REDIS_SOCKET_TIMEOUT_SECONDS
        value: 2
      - key: REDIS_CONNECT_TIMEOUT_SECONDS
        value: 2
      - key: REDIS_HEALTH_CHECK_INTERVAL_SECONDS
        value: 30
      - key: REDIS_MAX_CONNECTIONS
        value: 20

  - type: web
    name: agrimonitor-frontend
    env: static
    rootDir: agrimonitor_frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.19.5
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
